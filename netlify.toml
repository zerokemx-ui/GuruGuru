[build]
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "zisi"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[headers]]
  for = "/admin.html"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/admin-app.jsx"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/admin-tabs.jsx"
  [headers.values]
    Cache-Control = "no-cache"
